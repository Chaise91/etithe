apiVersion: v1
kind: Secret
metadata:
  name: etithe-auth
  namespace: etithe
type: Opaque
stringData:
  # Org admin demo credentials (replace before deploying to production)
  demo-email: "admin@church.org"
  demo-password: "changeme"
  # Platform (root) admin credentials — CHANGE THESE before deploying
  platform-email: "root@etithe.io"
  platform-password: "platformdev"
---
apiVersion: v1
kind: Secret
metadata:
  name: etithe-db
  namespace: etithe
type: Opaque
stringData:
  # Set this to the RDS endpoint URL from Terraform outputs
  # Example: postgresql://etithe_admin:<password>@<rds-endpoint>:5432/etithe
  database-url: "REPLACE_WITH_RDS_DATABASE_URL"
