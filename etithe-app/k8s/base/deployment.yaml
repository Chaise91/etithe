apiVersion: apps/v1
kind: Deployment
metadata:
  name: etithe-app
  namespace: etithe
  labels:
    app: etithe-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etithe-app
  template:
    metadata:
      labels:
        app: etithe-app
    spec:
      containers:
      - name: etithe-app
        image: PLACEHOLDER_IMAGE
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_APP_URL
          value: "http://localhost:3000"
        - name: AUTH_DEMO_EMAIL
          value: "admin@church.org"
        - name: AUTH_DEMO_PASSWORD
          value: "changeme"
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 20
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
