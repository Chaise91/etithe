# docker-compose.yml
services:
  localstack:
    image: localstack/localstack
    ports:
      - "4566:4566"        # all services on one port
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - SERVICES=s3,ec2,iam,route53,elbv2,eks,cognito-idp,dynamodb,cloudwatch,logs
      - DEBUG=1
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"

  etithe-app:
    build:
      context: ../etithe-app
      dockerfile: Dockerfile
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - AUTH_DEMO_EMAIL=admin@church.org
      - AUTH_DEMO_PASSWORD=changeme
    ports:
      - "3000:3000"
    depends_on:
      - localstack